<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ShopDeck — Store Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --text-primary:#1d2025;
  --text-secondary:#7e8592;
  --brand-primary:#4066f1;
  --white:#fff;
  --pill-shadow:0 6px 18px rgba(29,40,80,.10),0 2px 5px rgba(29,40,80,.06);
  --btn-shadow:0 12px 26px rgba(64,102,241,.38),0 3px 8px rgba(64,102,241,.28);
  --gradient-ai-orb:linear-gradient(145deg,#2b6bff 8%,#3fd6c9 55%,#37e07f 96%);
  --gradient-btn:linear-gradient(96deg,#5b7df4 0%,#4066f1 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

html,body{height:100%;}
body{
  font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  color:var(--text-primary);
  background:#c9cee4;
  display:flex;
  justify-content:center;
  align-items:flex-start;  /* frame uses its own content height, not the viewport's */
  min-height:100dvh;
}

/* ============ FRAME ============ */
.frame{
  position:relative;
  width:440px;
  max-width:100%;
  min-height:100dvh;      /* at least full height, but can grow taller */
  margin:0 auto;
  display:flex;
  flex-direction:column;
  overflow-x:clip;        /* clip the glow sideways, never clip content vertically */
  background:
    radial-gradient(120% 55% at 50% 34%, #eef0fb 0%, #e6e9f8 45%, #e4e7f6 100%),
    #e6e9f8;
}
.frame::before{
  content:"";
  position:absolute;
  top:16%;left:50%;
  width:520px;height:520px;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(140,220,205,.28) 0%, rgba(140,220,205,0) 62%);
  pointer-events:none;
}

/* ---------- top bar (user) ---------- */
.topbar{
  display:flex;
  align-items:center;
  gap:13px;
  padding:22px 22px 0;
  position:relative;
  z-index:2;
}
.avatar{
  width:48px;height:48px;
  border-radius:50%;
  flex:none;
  padding:2px;
  background:conic-gradient(from 210deg,#f0a15a,#4066f1,#f0a15a);
  display:flex;align-items:center;justify-content:center;
}
.avatar span{
  width:100%;height:100%;
  border-radius:50%;
  /* placeholder store logo — swap the background for
     url('icons/avatar.png') center/cover when you have it */
  background:radial-gradient(circle at 50% 40%,#c98a4e,#8a5a2b);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;letter-spacing:.04em;
}
.greet h3{font-size:19px;font-weight:700;letter-spacing:-.01em;line-height:1.2;}
.greet p{font-size:14px;color:var(--text-secondary);font-weight:400;margin-top:1px;}

/* ---------- hero ---------- */
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:10px 28px 30px;
  position:relative;
  z-index:2;
}

/* --- orbit cluster --- */
.orbit{
  position:relative;
  width:340px;
  height:340px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.ring{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1.4px dashed #b8c0dd;
}
.ring.r1{width:200px;height:200px;}
.ring.r2{width:330px;height:330px;border-color:#c4cbe4;}

.orb{
  position:relative;
  width:118px;height:118px;
  border-radius:50%;
  background:var(--gradient-ai-orb);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 18px 34px rgba(45,110,220,.32),0 6px 14px rgba(46,180,150,.24),inset 0 2px 3px rgba(255,255,255,.35);
}
.orb.full{background:none;box-shadow:none;}
.orb.full img{width:118px;height:118px;}
.orb svg,.orb img{width:60px;height:60px;object-fit:contain;}

/* --- floating pills --- */
.pill{
  position:absolute;
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:8px 6px;
  background:var(--white);
  border-radius:8px;
  box-shadow:var(--pill-shadow);
  font-size:12px;
  line-height: 16px;
  font-weight:500;
  white-space:nowrap;
}
.pill svg,.pill img{width:19px;height:19px;flex:none;object-fit:contain;}
.pill.build   {top:26%;   left:-24px; --fx:120px;  --fy:26px;}
.pill.catalog {top:8%;    right:-14px;--fx:-120px; --fy:70px;}
.pill.strategy{bottom:22%;right:-20px;--fx:-110px; --fy:-40px;}
.pill.support {bottom:6%; left:8px;   --fx:110px;  --fy:-60px;}

/* --- headline --- */
.headline{
  text-align:center;
  font-size:20px;
  line-height:24px;
  font-weight:600;          /* semibold */
  letter-spacing:-.01em;
  margin-top:12px;
}
.subtitle{
  margin-top:10px;
  max-width:320px;
  text-align:center;
  font-size:13px;
  line-height:18px;
  font-weight:400;
  color:var(--text-secondary);
}

/* ---------- footer ---------- */
.footer{
  position:relative;
  z-index:3;
  padding:0 22px calc(22px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  gap:16px;
}
.notice{
  display:flex;
  align-items:center;
  gap:14px;
  background:var(--white);
  border:1px solid #ececf3;
  border-radius:8px;
  padding:15px 16px;
  box-shadow:0 8px 24px rgba(40,55,110,.06);
}
.notice-ic{
  width:48px;height:48px;
  flex:none;
  border-radius:50%;
  background:#eef1f8;
  display:flex;align-items:center;justify-content:center;
}
.notice-ic img,.notice-ic svg{width:24px;height:24px;object-fit:contain;}
.notice p{
  font-size:16px;
  line-height:1.4;
  color:#4a5163;
  font-weight:400;
}
.notice b{color:var(--text-primary);font-weight:700;}
.cta{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:40px;
  border:none;
  cursor:pointer;
  padding:0 18px;
  border-radius:8px;
  background:var(--gradient-btn);
  color:#fff;
  font-family:inherit;
  font-size:13px;
  line-height:16px;
  font-weight:600;
  letter-spacing:-.01em;
  box-shadow:var(--btn-shadow);
  transition:transform .15s ease, box-shadow .15s ease;
}
.cta:hover{transform:translateY(-1px);box-shadow:0 16px 30px rgba(64,102,241,.44),0 4px 10px rgba(64,102,241,.3);}
.cta:active{transform:translateY(1px);}

/* ============ INTRO ANIMATION ============ */
.topbar{opacity:0;animation:fadeIn .6s ease-out .1s forwards;}

.orb{opacity:0;animation:orbIn 1.25s cubic-bezier(.22,.68,.24,1) .2s forwards;}
@keyframes orbIn{
  0%  {opacity:0;transform:rotate(-120deg) scale(.55);}
  55% {opacity:1;}
  100%{opacity:1;transform:rotate(0deg) scale(1);}
}

.ring{opacity:0;}
.ring.r1{animation:ringIn .8s cubic-bezier(.22,.68,.24,1) .6s forwards;}
.ring.r2{animation:ringIn .8s cubic-bezier(.22,.68,.24,1) .8s forwards;}
@keyframes ringIn{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.15);}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
}

.pill{opacity:0;}
.pill.build   {animation:pillOut .55s cubic-bezier(.2,.75,.28,1) 1.50s forwards;}
.pill.strategy{animation:pillOut .55s cubic-bezier(.2,.75,.28,1) 1.75s forwards;}
.pill.catalog {animation:pillOut .55s cubic-bezier(.2,.75,.28,1) 2.00s forwards;}
.pill.support {animation:pillOut .55s cubic-bezier(.2,.75,.28,1) 2.25s forwards;}
@keyframes pillOut{
  0%  {opacity:0;transform:translate(var(--fx),var(--fy)) scale(.4);}
  60% {opacity:1;}
  100%{opacity:1;transform:translate(0,0) scale(1);}
}

.headline{opacity:0;animation:riseIn .6s ease-out 2.70s forwards;}
.subtitle{opacity:0;animation:riseIn .6s ease-out 2.82s forwards;}
.footer  {opacity:0;animation:sheetUp .7s cubic-bezier(.22,.68,.24,1) 2.70s forwards;}
@keyframes riseIn{
  0%  {opacity:0;transform:translateY(18px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes sheetUp{
  0%  {opacity:0;transform:translateY(60px);}
  100%{opacity:1;transform:translateY(0);}
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

@media (prefers-reduced-motion:reduce){
  .topbar,.orb,.ring,.pill,.headline,.subtitle,.footer{
    opacity:1!important;animation:none!important;transform:none!important;
  }
  .ring{transform:translate(-50%,-50%)!important;}
}

/* ============ small phones (<=440px) ============ */
@media (max-width:440px){
  .frame{width:100%;}
}
@media (max-width:380px){
  .orbit{width:300px;height:300px;}
  .ring.r2{width:290px;height:290px;}
}
@media (max-width:330px){
  .orbit{width:270px;height:270px;}
  .ring.r2{width:262px;height:262px;}
}
</style>
</head>
<body>
  <main class="frame">

    <!-- top bar -->
    <header class="topbar">
      <div class="avatar"><span>IL</span></div>
      <div class="greet">
        <h3>Hi Rohit,</h3>
        <p>Indialinen.com</p>
      </div>
    </header>

    <!-- hero -->
    <section class="hero">
      <div class="orbit">
        <span class="ring r1"></span>
        <span class="ring r2"></span>

        <div class="pill build">
          <img src="icons/build-website.svg" alt="">
          Build Website
        </div>
        <div class="pill catalog">
          <img src="icons/crate-catalogue.svg" alt="">
          Create Catalogue
        </div>
        <div class="pill strategy">
          <img src="icons/weekly-strategy.svg" alt="">
          Weekly Strategy
        </div>
        <div class="pill support">
          <img src="icons/support.svg" alt="">
          24×7 support
        </div>

        <!-- orb (AI icon includes the gradient circle) -->
        <div class="orb full">
          <img src="icons/ai-orb.svg" alt="ShopDeck AI">
        </div>
      </div>

      <h1 class="headline">From zero to live<br>faster than ever</h1>
      <p class="subtitle">From your catalog to your online store - AI handles the work, so you can grow your business.</p>
    </section>

    <!-- footer -->
    <section class="footer">
      <div class="notice">
        <span class="notice-ic"><img src="icons/phone-incoming.svg" alt=""></span>
        <p><b>Shopdeck AI</b> will call you in the next 10 minutes to start your journey</p>
      </div>
      <button class="cta" type="button">Continue</button>
    </section>

  </main>
</body>
</html>
